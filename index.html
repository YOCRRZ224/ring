<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevRing</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #141414;
            --border-color: #262626;
            --border-hover: #404040;
            --text-primary: #ededed;
            --text-secondary: #a3a3a3;
            --accent: #ffffff;
            --radius-lg: 16px;
            --radius-sm: 8px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            padding: 5vw;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Header & Controls --- */
        header {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 60px auto;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 16px 20px 16px 45px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            background: var(--surface-color);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--border-hover);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .clear-search {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: none;
            text-decoration: underline;
        }
        
        .clear-search:hover { color: var(--text-primary); }

        /* --- Grid & Cards --- */
        #members {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .card img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .card h2 span {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 2px;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        /* --- Tags --- */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tags span {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .tags span:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        /* --- Links --- */
        .links {
            display: flex;
            gap: 10px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .links a {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .links a:hover {
            background: var(--border-color);
        }

        .links svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* --- Utilities --- */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>DevRing</h1>
        <p>A collective of independent developers.</p>
        
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input id="search" placeholder="Search by name, handle, or stack..." autocomplete="off">
        </div>
        
        <div class="stats">
            <span id="count">Loading network...</span>
            <button id="clearBtn" class="clear-search">Clear filter</button>
        </div>
    </header>

    <div id="members"></div>

    <script>
        (async () => {
    const container = document.getElementById("members");
    const count = document.getElementById("count");
    const search = document.getElementById("search");
    const clearBtn = document.getElementById("clearBtn");
    
    let members = [];

    const globeIcon = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`;
    const githubIcon = `<svg viewBox="0 0 24 24"><path d="M12 1.27a11 11 0 00-3.48 21.46c.55.09.73-.28.73-.55v-1.84c-3.03.64-3.67-1.46-3.67-1.46-.55-1.29-1.28-1.65-1.28-1.65-.92-.65.1-.65.1-.65 1.1 0 1.73 1.1 1.73 1.1.92 1.65 2.57 1.2 3.21.92a2 2 0 01.64-1.47c-2.47-.27-5.04-1.19-5.04-5.5 0-1.1.46-2.1 1.2-2.84a3.76 3.76 0 010-2.93s.91-.28 3.11 1.1c1.8-.49 3.7-.49 5.5 0 2.1-1.38 3.02-1.1 3.02-1.1a3.76 3.76 0 010 2.93c.83.74 1.2 1.74 1.2 2.84 0 4.32-2.57 5.23-5.04 5.5.64.55 1.1 1.65 1.1 3.3v2.2c0 .28.2.65.74.55A11 11 0 0012 1.27"/></svg>`;

    // Live Production Fetch Engine
    try {
        const files = await fetch("members/index.json").then(r => {
            if (!r.ok) throw new Error("Index file not found");
            return r.json();
        });

        members = await Promise.all(
            files.map(file => 
                fetch(`members/${file}`)
                    .then(r => r.ok ? r.json() : null)
                    .catch(() => null) // Ignore individual broken profiles gracefully
            )
        );
        
        // Filter out any profiles that failed to fetch or parse
        members = members.filter(m => m !== null);

    } catch (error) {
        count.textContent = "Error loading ring data";
        container.innerHTML = `
            <div class="empty-state">
                <h2>Failed to connect to DevRing</h2>
                <p>Ensure <code>members/index.json</code> exists and is accessible via HTTP/localhost server.</p>
            </div>`;
        return;
    }

    // Interactive Render Pipeline
    function render(filter = "") {
        container.innerHTML = "";
        const f = filter.toLowerCase().trim();
        
        clearBtn.style.display = f ? "block" : "none";

        const list = members.filter(m =>
            m.name?.toLowerCase().includes(f) ||
            m.github?.toLowerCase().includes(f) ||
            m.description?.toLowerCase().includes(f) ||
            m.tags?.join(" ").toLowerCase().includes(f)
        );

        count.textContent = `${list.length} ${list.length === 1 ? 'Node' : 'Nodes'} connected`;

        if (list.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h2>No matches found</h2>
                    <p>Try searching for a different handle, stack, or developer name.</p>
                </div>`;
            return;
        }

        list.forEach((m, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${index * 0.04}s`;
            
            card.innerHTML = `
                <div class="card-header">
                    <img src="${m.avatar}" alt="${m.name}" loading="lazy" onerror="this.src='https://api.dicebear.com/7.x/identicon/svg?seed=${m.github}'">
                    <h2>${m.name} <span>@${m.github}</span></h2>
                </div>
                
                <p>${m.description || ''}</p>
                
                <div class="tags">
                    ${(m.tags || []).map(t => `<span onclick="setSearch('${t}')">${t}</span>`).join("")}
                </div>
                
                <div class="links">
                    <a href="${m.url}" target="_blank" rel="noopener noreferrer">
                        ${globeIcon} Website
                    </a>
                    <a href="https://github.com/${m.github}" target="_blank" rel="noopener noreferrer">
                        ${githubIcon} GitHub
                    </a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Dynamic filtering when clicking on user tags
    window.setSearch = function(term) {
        search.value = term;
        render(term);
        search.focus();
    };

    clearBtn.onclick = () => {
        search.value = "";
        render("");
        search.focus();
    };

    // High performance search filtering (300ms debounce)
    let timeout;
    search.oninput = e => {
        clearTimeout(timeout);
        timeout = setTimeout(() => render(e.target.value), 300);
    };

    // Initial render call
    render();
})();

    </script>
</body>
</html>
